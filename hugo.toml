# 本地开发用 / ，部署时用 hugo build --baseURL=https://your-domain.com/
baseURL = '/'
languageCode = 'zh-cn'
title = 'Catslanding'
theme = 'hugo-PaperMod'

[params]
  mainSections = ["posts"]
  env = 'production'
  description = 'Catslanding'
  author = 'Catslanding'
  
  # Home info params - 紧凑的欢迎信息
  # homeInfoParams = {Title = "欢迎", Content = "记录学习与分享"}
  
  # PaperMod theme options
  showtoc = true
  ShowToc = true
  tocOpen = false
  disableSpecial1stPost = true
  
  # Profile mode
  [params.profileMode]
    enabled = false
    hiddenFromHome = false
  
  # Archive
  enableArchive = true
  
  [params.social]
    github = ""
    twitter = ""
    instagram = ""
    linkedin = ""
    mastodon = ""
    rss = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
  
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/opencode/"
    weight = 2
    
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 3

[markup.highlight]
  noClasses = false
  lineNos = true

# Goldmark markdown with math support
[markup.goldmark]
  [markup.goldmark.renderer]
    unsafe = true

[markup.goldmark.extensions.math]
  enable = true
